<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Theme Demos</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        h1 {
            text-align: center;
        }

        .demo-container {
            width: 80%;
            max-width: 800px;
            height: 300px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }

        .title-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        /* OPTION 1: Nebula */
        .opt-1 {
            background: linear-gradient(-45deg, #1A1A2E, #16213E, #0F3460, #E94560);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* OPTION 2: Cyberpunk Grid */
        .opt-2 {
            background-color: #0b0c10;
            background-image:
                linear-gradient(rgba(102, 252, 241, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 252, 241, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            box-shadow: inset 0 0 100px #0b0c10;
        }

        /* OPTION 3: Glassy Aurora */
        .opt-3 {
            background:
                radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.5), transparent 60%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.5), transparent 60%),
                #0f172a;
        }

        /* OPTION 4: Lofi Sunset */
        .opt-4 {
            background: linear-gradient(120deg, #ff7e5f, #feb47b, #86a8e7, #91eae4);
            background-size: 300% 300%;
            animation: gradientBG 20s ease infinite;
        }

        /* OPTION 5: Premium Minimalist Noise */
        .opt-5 {
            background-color: #121212;
            background-image: radial-gradient(#333 1.5px, transparent 1.5px);
            background-size: 30px 30px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body>
    <h1>Preview The 5 Themes</h1>
    <p>Scroll down to view all animations. The actual web app will have these applied seamlessly!</p>

    <div class="demo-container opt-1">
        <div class="title-badge">Option 1: The "Nebula" 🌌</div>
    </div>

    <div class="demo-container opt-2">
        <div class="title-badge">Option 2: Cyberpunk Grid 🤖</div>
    </div>

    <div class="demo-container opt-3">
        <div class="title-badge">Option 3: Glassy Aurora ✨</div>
    </div>

    <div class="demo-container opt-4">
        <div class="title-badge">Option 4: Lofi Sunset 🌅</div>
    </div>

    <div class="demo-container opt-5">
        <div class="title-badge">Option 5: Premium Minimalist 🖤</div>
    </div>

</body>

</html>
